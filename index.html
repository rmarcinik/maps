<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
        />
        <title>Maps</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: #000;
                overflow: hidden;
            }

            #map {
                width: 100%;
                height: 100%;
            }

            /* Push controls above phone home bar */
            .maplibregl-ctrl-bottom-right {
                bottom: max(12px, env(safe-area-inset-bottom));
                right: max(12px, env(safe-area-inset-right));
            }

            /* OLED-safe control styling */
            .maplibregl-ctrl-group {
                background: #111 !important;
                border: 1px solid #333 !important;
            }

            .maplibregl-ctrl-group button {
                background: #111 !important;
                filter: invert(1);
            }

            .maplibregl-ctrl-attrib {
                background: rgba(0, 0, 0, 0.7) !important;
                color: #555 !important;
            }

            .maplibregl-ctrl-attrib a {
                color: #555 !important;
            }

            #street-svg,
            #street-labels {
                position: absolute;
                inset: 0;
                pointer-events: none;
                overflow: hidden;
            }

            .pin-marker {
                position: absolute;
                width: 10px;
                height: 10px;
                background: #ff3333;
                border-radius: 50%;
                transform: translate(-50%, -50%);
                box-shadow: 0 0 0 2px #000;
                pointer-events: none;
            }

            #context-menu {
                position: absolute;
                background: #111;
                border: 1px solid #333;
                z-index: 10;
                pointer-events: auto;
            }

            #context-menu button {
                display: block;
                width: 100%;
                padding: 8px 16px;
                background: none;
                border: none;
                color: #ccc;
                font: 300 13px/1 "Inter", sans-serif;
                letter-spacing: 0.04em;
                text-align: left;
                cursor: pointer;
                white-space: nowrap;
            }

            #context-menu button:hover {
                background: #222;
                color: #fff;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <svg id="street-svg" width="100%" height="100%"></svg>
        <div id="street-labels"></div>
        <div id="context-menu" hidden>
            <button id="cm-place">Place pin</button>
            <button id="cm-clear">Clear pins</button>
        </div>
        <script type="importmap">
        { "imports": { "@chenglou/pretext": "/node_modules/@chenglou/pretext/dist/layout.js" } }
        </script>
        <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
        <script type="module" src="map.js"></script>
    </body>
</html>
