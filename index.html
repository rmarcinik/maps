<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
        />
        <title>Maps</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: #000;
                overflow: hidden;
            }

            #map {
                width: 100%;
                height: 100%;
            }

            /* Push controls above phone home bar */
            .maplibregl-ctrl-bottom-right {
                bottom: max(12px, env(safe-area-inset-bottom));
                right: max(12px, env(safe-area-inset-right));
            }

            /* OLED-safe control styling */
            .maplibregl-ctrl-group {
                background: #111 !important;
                border: 1px solid #333 !important;
            }

            .maplibregl-ctrl-group button {
                background: #111 !important;
                filter: invert(1);
            }

            .maplibregl-ctrl-attrib {
                background: rgba(0, 0, 0, 0.7) !important;
                color: #555 !important;
            }

            .maplibregl-ctrl-attrib a {
                color: #555 !important;
            }

            #street-labels {
                position: absolute;
                inset: 0;
                pointer-events: none;
                overflow: hidden;
            }

            .street-label {
                position: absolute;
                color: #ccc;
                font:
                    10px/1 "system-ui",
                    sans-serif;
                letter-spacing: 0.05em;
                white-space: nowrap;
                transform-origin: center center;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <div id="street-labels"></div>
        <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
        <script>
            const map = new maplibregl.Map({
                container: "map",
                style: "style.json",
                center: [0, 20],
                zoom: 2,
                attributionControl: { compact: true },
                pitchWithRotate: false,
            });

            const geolocate = new maplibregl.GeolocateControl({
                positionOptions: { enableHighAccuracy: true },
                trackUserLocation: true,
                showUserHeading: true,
            });

            map.addControl(geolocate, "bottom-right");
            map.on("load", () => geolocate.trigger());

            if ("serviceWorker" in navigator)
                navigator.serviceWorker.register("sw.js");

            // --- Focus-radius street labels ---
            // foci is an array so future pins can each have their own focus.
            //
            // Two-path design:
            //   slow path — queryRenderedFeatures → cache geo coords (on tile load / zoom)
            //   fast path — reproject cached geo → screen, update label positions (every move frame)

            const overlay = document.getElementById("street-labels");

            // name → array of polylines [[lng,lat],...] in geo coords
            let streetCache = new Map();
            // name → DOM element, reused across frames
            let labelEls = new Map();

            // Returns intersection points of segment p1→p2 with a circle at (cx,cy,r).
            function circleSegmentIntersections(p1, p2, cx, cy, r) {
                const dx = p2.x - p1.x,
                    dy = p2.y - p1.y;
                const fx = p1.x - cx,
                    fy = p1.y - cy;
                const a = dx * dx + dy * dy;
                const b = 2 * (fx * dx + fy * dy);
                const c = fx * fx + fy * fy - r * r;
                const disc = b * b - 4 * a * c;
                if (disc < 0 || a === 0) return [];
                const sq = Math.sqrt(disc);
                return [(-b - sq) / (2 * a), (-b + sq) / (2 * a)]
                    .filter((t) => t >= 0 && t <= 1)
                    .map((t) => ({ x: p1.x + t * dx, y: p1.y + t * dy }));
            }

            function buildFoci(W, H) {
                // One focus at map center. Replace/extend for pin support.
                return [{ x: W / 2, y: H / 2, r: Math.min(W, H) * 0.4 }];
            }

            // Slow path: replace cache with current viewport's streets, prune stale DOM.
            // Bounded to whatever is rendered right now — never accumulates.
            function refreshCache() {
                if (map.getZoom() < 14) {
                    streetCache.clear();
                    for (const el of labelEls.values()) el.remove();
                    labelEls.clear();
                    return;
                }

                const next = new Map();
                for (const f of map.queryRenderedFeatures({
                    layers: ["road-name-data"],
                })) {
                    const name = f.properties.name;
                    const type = f.geometry.type;
                    if (!name || next.has(name)) continue;
                    if (type !== "LineString" && type !== "MultiLineString") continue;
                    next.set(
                        name,
                        type === "LineString"
                            ? [f.geometry.coordinates]
                            : f.geometry.coordinates,
                    );
                }
                streetCache = next;

                // Remove DOM elements for names no longer rendered
                for (const [name, el] of labelEls) {
                    if (!streetCache.has(name)) {
                        el.remove();
                        labelEls.delete(name);
                    }
                }
            }

            // Fast path: reproject cached geo → screen, show/hide/move label elements.
            function positionLabels() {
                if (map.getZoom() < 14) {
                    for (const el of labelEls.values())
                        el.style.display = "none";
                    return;
                }
                const canvas = map.getCanvas();
                const W = canvas.clientWidth,
                    H = canvas.clientHeight;
                const foci = buildFoci(W, H);
                const visible = new Set();

                for (const [name, lines] of streetCache) {
                    outer: for (const line of lines) {
                        const pts = line.map((c) => map.project(c));
                        for (let i = 0; i < pts.length - 1; i++) {
                            const p1 = pts[i],
                                p2 = pts[i + 1];
                            for (const focus of foci) {
                                const crosses = circleSegmentIntersections(
                                    p1,
                                    p2,
                                    focus.x,
                                    focus.y,
                                    focus.r,
                                );
                                if (!crosses.length) continue;

                                visible.add(name);
                                let angle =
                                    (Math.atan2(p2.y - p1.y, p2.x - p1.x) *
                                        180) /
                                    Math.PI;
                                if (angle > 90) angle -= 180;
                                if (angle < -90) angle += 180;

                                if (!labelEls.has(name)) {
                                    const el = document.createElement("div");
                                    el.className = "street-label";
                                    el.textContent = name;
                                    overlay.appendChild(el);
                                    labelEls.set(name, el);
                                }
                                const el = labelEls.get(name);
                                el.style.display = "";
                                el.style.left = crosses[0].x + "px";
                                el.style.top = crosses[0].y + "px";
                                el.style.transform = `translate(-50%,-50%) rotate(${angle}deg)`;
                                break outer;
                            }
                        }
                    }
                }

                for (const [name, el] of labelEls) {
                    if (!visible.has(name)) el.style.display = "none";
                }
            }

            // Slow path: refresh once map is fully settled (tiles loaded + render done).
            // 'idle' fires at most once per settled state — far less noisy than 'sourcedata'.
            map.on("idle", () => {
                refreshCache();
                positionLabels();
            });

            // Fast path: reposition every frame while panning
            map.on("move", positionLabels);
            map.on("load", () => {
                refreshCache();
                positionLabels();
            });
        </script>
    </body>
</html>
