<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
        />
        <title>Maps</title>
        <link rel="shortcut icon" href="favicon.ico">
        <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.23.0/dist/maplibre-gl.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&family=Courier+Prime:wght@700&family=Roboto+Slab:wght@900&family=Inter:wght@300&display=swap" rel="stylesheet" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: #000;
                overflow: hidden;
            }

            #map {
                width: 100%;
                height: 100%;
            }

            /* Push controls above phone home bar */
            .maplibregl-ctrl-bottom-right {
                bottom: max(12px, env(safe-area-inset-bottom));
                right: max(12px, env(safe-area-inset-right));
            }

            /* OLED-safe control styling */
            .maplibregl-ctrl-group {
                background: #111 !important;
                border: 1px solid #333 !important;
            }

            .maplibregl-ctrl-group button {
                background: #111 !important;
                filter: invert(1);
            }

            .maplibregl-ctrl-attrib {
                background: rgba(0, 0, 0, 0.7) !important;
                color: #555 !important;
            }

            .maplibregl-ctrl-attrib a {
                color: #555 !important;
            }

            #street-svg,
            #street-labels {
                position: absolute;
                inset: 0;
                pointer-events: none;
                overflow: hidden;
            }

            .pin-marker {
                position: absolute;
                width: 10px;
                height: 10px;
                background: #ff3333;
                border-radius: 50%;
                transform: translate(-50%, -50%);
                box-shadow: 0 0 0 2px #000;
                pointer-events: none;
            }

            #context-menu {
                position: absolute;
                background: #111;
                border: 1px solid #333;
                z-index: 10;
                pointer-events: auto;
            }

            #context-menu button {
                display: block;
                width: 100%;
                padding: 8px 16px;
                background: none;
                border: none;
                color: #ccc;
                font: 300 13px/1 "Inter", sans-serif;
                letter-spacing: 0.04em;
                text-align: left;
                cursor: pointer;
                white-space: nowrap;
            }

            #context-menu button:hover {
                background: #222;
                color: #fff;
            }

            #coord-panel {
                position: absolute;
                bottom: calc(max(12px, env(safe-area-inset-bottom)) + 46px);
                right: max(12px, env(safe-area-inset-right));
                z-index: 5;
                display: flex;
                flex-direction: column;
                gap: 1px;
                align-items: stretch;
            }

            #coord-row {
                display: flex;
                gap: 1px;
            }

            #coord-input {
                background: #111;
                border: 1px solid #333;
                color: #ccc;
                font: 300 12px/1 "Inter", sans-serif;
                letter-spacing: 0.04em;
                padding: 6px 8px;
                width: 148px;
                outline: none;
            }

            #coord-input:focus { border-color: #555; }
            #coord-input::placeholder { color: #444; }

            #coord-row button {
                background: #111;
                border: 1px solid #333;
                color: #888;
                font: 300 14px/1 "Inter", sans-serif;
                padding: 6px 9px;
                cursor: pointer;
            }

            #coord-row button:hover { background: #222; color: #fff; }

            #pin-list {
                display: flex;
                flex-direction: column;
                gap: 1px;
            }

            .pin-entry {
                display: flex;
                gap: 1px;
            }

            .pin-coords {
                flex: 1;
                background: #111;
                border: 1px solid #333;
                color: #666;
                font: 300 11px/1 "Inter", sans-serif;
                letter-spacing: 0.03em;
                padding: 5px 8px;
                white-space: nowrap;
            }

            .pin-copy {
                background: #111;
                border: 1px solid #333;
                color: #555;
                font: 300 13px/1 "Inter", sans-serif;
                padding: 5px 8px;
                cursor: pointer;
            }

            .pin-copy:hover { background: #222; color: #fff; }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <svg id="street-svg" width="100%" height="100%"></svg>
        <div id="street-labels"></div>
        <div id="context-menu" hidden>
            <button id="cm-place">Place pin</button>
            <button id="cm-clear">Clear pins</button>
        </div>
        <div id="coord-panel">
            <div id="coord-row">
                <input id="coord-input" type="text" placeholder="lat, lng" spellcheck="false" autocomplete="off" />
                <button id="coord-add" title="Add pin">+</button>
                <button id="coord-copy" title="Copy center">⧉</button>
            </div>
            <div id="pin-list"></div>
        </div>
        <script src="https://unpkg.com/maplibre-gl@5.23.0/dist/maplibre-gl.js"></script>
        <script type="importmap">
        {
          "imports": {
            "@chenglou/pretext": "https://unpkg.com/@chenglou/pretext@0.0.4/dist/layout.js"
          }
        }
        </script>
        <script type="module" src="map.js"></script>
    </body>
</html>
